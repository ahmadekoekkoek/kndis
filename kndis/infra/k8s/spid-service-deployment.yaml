apiVersion: apps/v1
kind: Deployment
metadata:
  name: spid-service
  namespace: kndis
  labels:
    app: spid-service
    app.kubernetes.io/name: spid-service
    app.kubernetes.io/component: spid-generator
    app.kubernetes.io/part-of: kndis
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spid-service
  template:
    metadata:
      labels:
        app: spid-service
        app.kubernetes.io/name: spid-service
    spec:
      containers:
      - name: spid-service
        image: kndis/spid-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8081"
        envFrom:
        - configMapRef:
            name: kndis-config
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: spid-service
  namespace: kndis
  labels:
    app: spid-service
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: spid-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spid-service-hpa
  namespace: kndis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spid-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70