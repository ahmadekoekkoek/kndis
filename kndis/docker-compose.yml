version: '3.8'

services:
  # K-IdP - OAuth2/OIDC Identity Provider
  k-idp:
    build:
      context: .
      dockerfile: services/k-idp/Dockerfile
    container_name: kndis-k-idp
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - KONOHA_BASE_URL=http://localhost:8080
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # SPID Service - Sector Pseudonymous ID Generator
  spid-service:
    build:
      context: .
      dockerfile: services/spid-service/Dockerfile
    container_name: kndis-spid-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - GIN_MODE=release
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Consent Service - Consent Management
  consent-service:
    build:
      context: .
      dockerfile: services/consent-service/Dockerfile
    container_name: kndis-consent-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - GIN_MODE=release
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # KonohaX Gateway - API Gateway
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: kndis-gateway
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - GIN_MODE=release
      - CONSENT_SERVICE_URL=http://consent-service:8082
      - HEALTH_SERVICE_URL=http://health-service:8085
      - TAX_SERVICE_URL=http://tax-service:8086
      - BANK_SERVICE_URL=http://bank-service:8087
    depends_on:
      - consent-service
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Audit Log Service - Immutable Audit Logging
  audit-log:
    build:
      context: .
      dockerfile: services/audit-log/Dockerfile
    container_name: kndis-audit-log
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - GIN_MODE=release
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Token Service - JWT Token Management
  token-service:
    build:
      context: .
      dockerfile: services/token-service/Dockerfile
    container_name: kndis-token-service
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - GIN_MODE=release
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Credential Issuer Service - Verifiable Credentials
  credential-issuer:
    build:
      context: .
      dockerfile: services/credential-issuer/Dockerfile
    container_name: kndis-credential-issuer
    ports:
      - "8089:8089"
    environment:
      - PORT=8089
      - GIN_MODE=release
    networks:
      - kndis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Demo Health Service (for testing gateway)
  health-service:
    image: mendhak/http-https-echo:latest
    container_name: kndis-health-service
    ports:
      - "8085:8080"
    environment:
      - HTTP_PORT=8080
    networks:
      - kndis-network

  # Demo Tax Service (for testing gateway)
  tax-service:
    image: mendhak/http-https-echo:latest
    container_name: kndis-tax-service
    ports:
      - "8086:8080"
    environment:
      - HTTP_PORT=8080
    networks:
      - kndis-network

  # Demo Bank Service (for testing gateway)
  bank-service:
    image: mendhak/http-https-echo:latest
    container_name: kndis-bank-service
    ports:
      - "8087:8080"
    environment:
      - HTTP_PORT=8080
    networks:
      - kndis-network

  # Redis for token caching (optional)
  redis:
    image: redis:7-alpine
    container_name: kndis-redis
    ports:
      - "6379:6379"
    networks:
      - kndis-network
    restart: unless-stopped

networks:
  kndis-network:
    driver: bridge
    name: kndis-network